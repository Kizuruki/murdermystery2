<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Murder Mystery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0908;
    --surface: #160e0b;
    --surface2: #1f1411;
    --gold: #c9a84c;
    --gold-dim: #7a6230;
    --crimson: #7a1a1a;
    --crimson-bright: #c0392b;
    --text: #e8d9c0;
    --text-dim: #8a7560;
    --border: #2e1f17;
    --border-gold: #3d2e18;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; }

  body {
    font-family: 'IM Fell English', serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
  }

  /* Atmospheric background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(122,26,26,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 20% 100%, rgba(201,168,76,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(122,26,26,0.08) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  /* Grain overlay */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }

  .page { position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 1.5rem; }
    .gender-btn {
        flex: 1;
        padding: 0.5rem;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text-dim);
        font-family: 'Cinzel',serif;
        font-size: 0.72rem;
        cursor: pointer;
    }

        .gender-btn.active {
            border-color: var(--gold-dim);
            color: var(--gold);
        }
  /* Header */
  .header { text-align: center; margin-bottom: 2.5rem; }
  .skull { font-size: 2.5rem; margin-bottom: 0.5rem; filter: drop-shadow(0 0 20px rgba(192,57,43,0.6)); }
  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.4rem, 7vw, 2rem);
    color: var(--gold);
    letter-spacing: 0.06em;
    text-shadow: 0 0 30px rgba(201,168,76,0.3), 0 2px 4px rgba(0,0,0,0.8);
    line-height: 1.2;
  }
  .tagline {
    font-style: italic;
    color: var(--text-dim);
    font-size: 0.95rem;
    margin-top: 0.5rem;
    letter-spacing: 0.03em;
  }

  /* Ornament */
  .ornament {
    display: flex; align-items: center; gap: 0.75rem;
    margin: 1.5rem 0;
  }
  .ornament-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--gold-dim)); }
  .ornament-line:last-child { background: linear-gradient(to left, transparent, var(--gold-dim)); }
  .ornament-diamond { color: var(--gold-dim); font-size: 0.7rem; }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
  }
  .card-title {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
  }

  /* Inputs */
  input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.85rem 1rem;
    color: var(--text);
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: border-color 0.2s;
    outline: none;
    margin-bottom: 0.75rem;
    -webkit-appearance: none;
  }
  input[type="text"]::placeholder { color: var(--text-dim); text-transform: none; letter-spacing: 0.05em; font-family: 'IM Fell English', serif; font-style: italic; }
  input[type="text"]:focus { border-color: var(--gold-dim); }
  input.code-input { text-align: center; font-size: 1.5rem; letter-spacing: 0.3em; }

  /* Nickname input — no caps */
  input.nickname-input { text-transform: none; letter-spacing: 0.05em; }

  /* Buttons */
  .btn {
    width: 100%;
    padding: 0.9rem 1.5rem;
    border: 1px solid var(--gold-dim);
    border-radius: 3px;
    background: linear-gradient(135deg, var(--crimson) 0%, #5a1010 100%);
    color: var(--text);
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-appearance: none;
    position: relative;
    overflow: hidden;
  }
  .btn::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.05) 100%);
  }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary {
    background: transparent;
    border-color: var(--border);
    color: var(--text-dim);
  }
  .btn-ghost {
    background: transparent;
    border-color: var(--border-gold);
    color: var(--gold);
  }

  /* Error */
  .error-msg {
    background: rgba(122,26,26,0.3);
    border: 1px solid var(--crimson);
    border-radius: 3px;
    padding: 0.75rem 1rem;
    font-size: 0.9rem;
    margin-bottom: 0.75rem;
    display: none;
  }
  .error-msg.show { display: block; }

  /* Tabs */
  .tab-btns {
    display: flex;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.25rem;
  }
  .tab-btn {
    flex: 1;
    padding: 0.6rem;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-dim);
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: -1px;
  }
  .tab-btn.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 1rem;
    color: var(--text-dim);
    font-style: italic;
  }
  .loading.show { display: block; }

  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 0.5rem;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .version { text-align: center; color: var(--text-dim); font-size: 0.75rem; margin-top: 1.5rem; opacity: 0.5; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="skull">☽</div>
    <h1>Murder<br>Mystery</h1>
    <p class="tagline">A game of secrets and suspicion</p>
  </div>

  <div class="ornament">
    <div class="ornament-line"></div>
    <div class="ornament-diamond">◆</div>
    <div class="ornament-line"></div>
  </div>

  <div class="card">
    <div class="tab-btns">
      <button class="tab-btn active" onclick="switchTab('create')">Create Room</button>
      <button class="tab-btn" onclick="switchTab('join')">Join Room</button>
    </div>

    <div id="tab-create">
        <p class="card-title">Your Name</p>
        <input type="text" class="nickname-input" id="create-nickname" placeholder="Enter your name" maxlength="20">
        <div style="display:flex;gap:0.5rem;margin-bottom:0.75rem;">
            <button class="gender-btn active" onclick="setGender('either',this)">Either</button>
            <button class="gender-btn" onclick="setGender('male',this)">Male</button>
            <button class="gender-btn" onclick="setGender('female',this)">Female</button>
        </div>
        <div id="create-error" class="error-msg"></div>
        <button class="btn" onclick="createRoom()">Create Room</button>
    </div>

    <div id="tab-join" style="display:none">
        <p class="card-title">Room Code</p>
        <input type="text" class="code-input" id="join-code" placeholder="XXXXXX" maxlength="6" oninput="this.value=this.value.toUpperCase()">
        <p class="card-title" style="margin-top:0.75rem">Your Name</p>
        <input type="text" class="nickname-input" id="join-nickname" placeholder="Enter your name" maxlength="20">
        <div style="display:flex;gap:0.5rem;margin-bottom:0.75rem;">
            <button class="gender-btn active" onclick="setGender('either',this)">Either</button>
            <button class="gender-btn" onclick="setGender('male',this)">Male</button>
            <button class="gender-btn" onclick="setGender('female',this)">Female</button>
        </div>
        <div id="join-error" class="error-msg"></div>
        <button class="btn" onclick="joinRoom()">Join Room</button>
    </div>

    <div class="loading" id="loading">
      <span class="spinner"></span> Connecting...
    </div>
  </div>

  <p class="version">Murder Mystery v2.0</p>
</div>

<script>
    let selectedGender = 'either';
    function setGender(g, btn) {
        selectedGender = g;
        document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
  const PARTYKIT_HOST = "localhost:1999"; // ← replace with your partykit host

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (tab==='create'&&i===0)||(tab==='join'&&i===1)));
    document.getElementById('tab-create').style.display = tab === 'create' ? 'block' : 'none';
    document.getElementById('tab-join').style.display = tab === 'join' ? 'block' : 'none';
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 4000);
  }

  function generateRoomCode() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let code = '';
    const arr = new Uint32Array(6);
    crypto.getRandomValues(arr);
    arr.forEach(n => code += chars[n % chars.length]);
    return code;
  }

  function createRoom() {
    const nickname = document.getElementById('create-nickname').value.trim();
    if (!nickname) { showError('create-error', 'Please enter your name'); return; }
    const code = generateRoomCode();
    sessionStorage.setItem('mm_nickname', nickname);
    sessionStorage.setItem('mm_is_host', 'true');
    sessionStorage.setItem('mm_room_code', code);
    sessionStorage.setItem('mm_gender', selectedGender);
    window.location.href = `lobby.html?room=${code}&host=1`;
  }

  function joinRoom() {
    const code = document.getElementById('join-code').value.trim().toUpperCase();
    const nickname = document.getElementById('join-nickname').value.trim();
    if (code.length !== 6) { showError('join-error', 'Enter a 6-character room code'); return; }
    if (!nickname) { showError('join-error', 'Please enter your name'); return; }
    sessionStorage.setItem('mm_nickname', nickname);
    sessionStorage.setItem('mm_is_host', 'false');
    sessionStorage.setItem('mm_room_code', code);
    sessionStorage.setItem('mm_gender', selectedGender);
    window.location.href = `lobby.html?room=${code}`;
  }

  // Autofocus
  document.getElementById('create-nickname').focus();
</script>
</body>
</html>
