<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Murder Mystery</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0908;
            --surface: #160e0b;
            --surface2: #1f1411;
            --surface3: #261812;
            --gold: #c9a84c;
            --gold-dim: #7a6230;
            --gold-pale: #e8d090;
            --crimson: #7a1a1a;
            --crimson-bright: #c0392b;
            --crimson-pale: #c87070;
            --good: #2a5c3f;
            --good-bright: #4caf7a;
            --evil: #7a1a1a;
            --evil-bright: #c0392b;
            --text: #e8d9c0;
            --text-dim: #8a7560;
            --text-faint: #5a4535;
            --border: #2e1f17;
            --border-gold: #3d2e18;
            --phase-day: #2a3d1a;
            --phase-night: #0d0918;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: 'IM Fell English',serif;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 480px;
            margin: 0 auto;
            position: relative;
        }

        .topbar {
            flex-shrink: 0;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.5rem 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 50;
        }

        .phase-pill {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 0.35rem 0.75rem;
            font-family: 'Cinzel',serif;
            font-size: 0.7rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gold);
            text-align: center;
        }

            .phase-pill.night {
                background: rgba(13,9,24,0.8);
                border-color: #2a1f40;
                color: #9b8ec4;
            }

            .phase-pill.day {
                background: rgba(42,61,26,0.5);
                border-color: #3a5020;
                color: #8dc45a;
            }

        .timer-badge {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 0.3rem 0.6rem;
            font-family: 'Cinzel',serif;
            font-size: 0.8rem;
            color: var(--text);
            min-width: 40px;
            text-align: center;
        }

            .timer-badge.urgent {
                color: var(--crimson-bright);
                border-color: var(--crimson);
                animation: pulse 1s infinite;
            }

        @keyframes pulse {
            0%,100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }

        .role-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 3px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            cursor: pointer;
            flex-shrink: 0;
        }

        .pages {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .page {
            position: absolute;
            inset: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            transition: transform 0.3s ease,opacity 0.3s ease;
        }

            .page.slide-left {
                transform: translateX(-100%);
                opacity: 0;
                pointer-events: none;
            }

            .page.slide-right {
                transform: translateX(100%);
                opacity: 0;
                pointer-events: none;
            }

            .page.active {
                transform: translateX(0);
                opacity: 1;
            }

        .page-inner {
            padding: 0.75rem;
            padding-bottom: 80px;
        }

        .page-tabs {
            flex-shrink: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            z-index: 50;
        }

        .page-tab {
            flex: 1;
            padding: 0.65rem 0;
            background: transparent;
            border: none;
            font-family: 'Cinzel',serif;
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-dim);
            cursor: pointer;
            border-top: 2px solid transparent;
            transition: all 0.2s;
        }

            .page-tab.active {
                color: var(--gold);
                border-top-color: var(--gold);
            }

            .page-tab .tab-icon {
                display: block;
                font-size: 1rem;
                margin-bottom: 0.15rem;
            }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            margin-bottom: 0.75rem;
            overflow: hidden;
        }

        .card-header {
            padding: 0.65rem 0.85rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-family: 'Cinzel',serif;
            font-size: 0.68rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--gold);
        }

        .card-body {
            padding: 0.85rem;
        }

        .clue-item {
            padding: 0.6rem 0.75rem;
            background: var(--surface2);
            border-left: 3px solid var(--gold-dim);
            border-radius: 0 3px 3px 0;
            margin-bottom: 0.5rem;
            font-size: 0.88rem;
            line-height: 1.5;
            position: relative;
        }

            .clue-item.real {
                border-left-color: var(--good-bright);
            }

            .clue-item.fake {
                border-left-color: var(--crimson-bright);
            }

        .clue-label {
            font-size: 0.65rem;
            font-family: 'Cinzel',serif;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 0.2rem;
        }

        .clue-share-btn {
            font-size: 0.65rem;
            font-family: 'Cinzel',serif;
            letter-spacing: 0.08em;
            background: transparent;
            border: 1px solid var(--gold-dim);
            border-radius: 2px;
            padding: 0.2rem 0.5rem;
            color: var(--gold-dim);
            cursor: pointer;
            margin-top: 0.4rem;
        }

            .clue-share-btn.shared {
                color: var(--good-bright);
                border-color: var(--good-bright);
            }

        .feedback-item {
            padding: 0.6rem 0.75rem;
            background: var(--surface2);
            border-left: 3px solid var(--border-gold);
            border-radius: 0 3px 3px 0;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .feedback-round {
            font-size: 0.65rem;
            font-family: 'Cinzel',serif;
            color: var(--text-dim);
            margin-bottom: 0.2rem;
        }

        .obj-item {
            padding: 0.6rem 0.75rem;
            background: var(--surface2);
            border-radius: 3px;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            line-height: 1.5;
            border: 1px solid var(--border);
        }

            .obj-item.done {
                opacity: 0.5;
            }

        .obj-item-row {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
        }

        .obj-check {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            border: 1px solid var(--border-gold);
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--gold);
            font-size: 0.75rem;
            margin-top: 0.1rem;
        }

            .obj-check.checked {
                background: var(--good);
                border-color: var(--good-bright);
            }

        .obj-completed-by {
            font-size: 0.72rem;
            color: var(--good-bright);
            margin-top: 0.35rem;
            font-style: italic;
        }

        /* Inline objective player picker */
        .obj-picker {
            margin-top: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            max-height: 160px;
            overflow-y: auto;
        }

        .obj-picker-item {
            padding: 0.4rem 0.6rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: 'Cinzel',serif;
            transition: all 0.15s;
        }

            .obj-picker-item:hover {
                border-color: var(--gold-dim);
                background: rgba(201,168,76,0.05);
            }

        .obj-picker-cancel {
            padding: 0.35rem;
            text-align: center;
            font-size: 0.72rem;
            color: var(--text-dim);
            cursor: pointer;
            font-family: 'Cinzel',serif;
            letter-spacing: 0.08em;
        }

        .notes-textarea {
            width: 100%;
            min-height: 100px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 0.6rem;
            color: var(--text);
            font-family: 'IM Fell English',serif;
            font-size: 0.9rem;
            line-height: 1.6;
            resize: vertical;
            outline: none;
        }

            .notes-textarea:focus {
                border-color: var(--gold-dim);
            }

        .pref-tag {
            display: inline-block;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.2rem 0.6rem;
            font-size: 0.75rem;
            margin: 0.2rem;
            color: var(--text-dim);
        }

            .pref-tag.like {
                border-color: var(--good);
                color: var(--good-bright);
            }

            .pref-tag.dislike {
                border-color: var(--crimson);
                color: var(--crimson-pale);
            }

        .code-entry {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

            .code-entry input {
                flex: 1;
                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: 3px;
                padding: 0.6rem;
                color: var(--text);
                font-family: 'Cinzel',serif;
                font-size: 0.9rem;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                outline: none;
                text-align: center;
            }

                .code-entry input:focus {
                    border-color: var(--gold-dim);
                }

            .code-entry button {
                background: var(--surface2);
                border: 1px solid var(--gold-dim);
                border-radius: 3px;
                padding: 0.6rem 0.85rem;
                color: var(--gold);
                font-family: 'Cinzel',serif;
                font-size: 0.75rem;
                letter-spacing: 0.08em;
                cursor: pointer;
                white-space: nowrap;
            }

        .tracker-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .tracker-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 0.75rem;
            background: var(--surface2);
            border-radius: 3px;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

            .tracker-item.dead {
                opacity: 0.4;
            }

            .tracker-item.circled {
                border-color: var(--gold);
            }

            .tracker-item.xed {
                opacity: 0.35;
            }

        .tracker-name {
            flex: 1;
            min-width: 0;
        }

        .tracker-char-name {
            font-family: 'Cinzel',serif;
            font-size: 0.8rem;
            color: var(--text);
            position: relative;
        }

            .tracker-char-name.dead-x::after {
                content: '';
                position: absolute;
                left: 0;
                right: 0;
                top: 50%;
                height: 1px;
                background: var(--crimson);
            }

        .tracker-nickname {
            font-size: 0.72rem;
            color: var(--text-dim);
            font-style: italic;
        }

        .tracker-role-guess {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 0.25rem 0.4rem;
            color: var(--text-dim);
            font-family: 'IM Fell English',serif;
            font-size: 0.75rem;
            outline: none;
            max-width: 90px;
            -webkit-appearance: none;
        }

            .tracker-role-guess:focus {
                border-color: var(--gold-dim);
            }

        .tracker-marks {
            display: flex;
            gap: 0.35rem;
        }

        .mark-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid var(--border);
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

            .mark-btn.circle-active {
                background: rgba(201,168,76,0.2);
                border-color: var(--gold);
                color: var(--gold);
            }

            .mark-btn.x-active {
                background: rgba(122,26,26,0.2);
                border-color: var(--crimson);
                color: var(--crimson-pale);
            }

        .action-panel {
            background: var(--surface);
            border: 1px solid var(--border-gold);
            border-radius: 4px;
            margin-bottom: 0.75rem;
            overflow: hidden;
        }

        .action-header {
            padding: 0.75rem 0.85rem;
            background: linear-gradient(135deg,rgba(122,26,26,0.4),transparent);
            border-bottom: 1px solid var(--border);
            font-family: 'Cinzel',serif;
            font-size: 0.72rem;
            letter-spacing: 0.15em;
            color: var(--gold);
        }

        .action-body {
            padding: 0.85rem;
        }

        .player-picker {
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
            max-height: 50vh;
            overflow-y: auto;
        }

        .picker-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 0.75rem;
            background: var(--surface2);
            border-radius: 3px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.15s;
        }

            .picker-item.selected {
                border-color: var(--gold);
                background: rgba(201,168,76,0.08);
            }

                .picker-item.selected::before {
                    content: '▶';
                    color: var(--gold);
                    font-size: 0.6rem;
                }

        .picker-item-name {
            font-family: 'Cinzel',serif;
            font-size: 0.82rem;
        }

        .picker-item-sub {
            font-size: 0.72rem;
            color: var(--text-dim);
            font-style: italic;
        }

        .submit-btn {
            width: 100%;
            margin-top: 0.75rem;
            padding: 0.85rem;
            background: linear-gradient(135deg,var(--crimson),#5a1010);
            border: 1px solid var(--gold-dim);
            border-radius: 3px;
            color: var(--text);
            font-family: 'Cinzel',serif;
            font-size: 0.82rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

            .submit-btn:active {
                transform: scale(0.98);
            }

            .submit-btn:disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }

            .submit-btn.submitted {
                background: var(--good);
                border-color: var(--good-bright);
                color: var(--gold-pale);
            }

        .death-banner {
            background: linear-gradient(135deg,rgba(122,26,26,0.5),rgba(13,9,24,0.8));
            border: 1px solid var(--crimson);
            border-radius: 4px;
            padding: 0.85rem;
            margin-bottom: 0.75rem;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .death-name {
            font-family: 'Cinzel',serif;
            font-size: 0.95rem;
            color: var(--gold);
        }

        .death-sub {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 0.2rem;
            font-style: italic;
        }

        .chat-wrapper {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 140px);
        }

        .chat-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 0.5rem;
        }

        .chat-tab {
            padding: 0.4rem 0.75rem;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-dim);
            font-family: 'Cinzel',serif;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: -1px;
        }

            .chat-tab.active {
                color: var(--gold);
                border-bottom-color: var(--gold);
            }

            .chat-tab .unread {
                display: inline-block;
                background: var(--crimson-bright);
                border-radius: 8px;
                padding: 0.05rem 0.35rem;
                font-size: 0.55rem;
                margin-left: 0.3rem;
                color: white;
                vertical-align: middle;
            }

        .messages {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            padding: 0.25rem 0;
        }

        .msg {
            padding: 0.5rem 0.7rem;
            background: var(--surface2);
            border-radius: 3px;
            border: 1px solid var(--border);
            max-width: 90%;
        }

            .msg.mine {
                align-self: flex-end;
                background: rgba(122,26,26,0.3);
                border-color: var(--crimson);
            }

            .msg.evil {
                background: rgba(60,0,0,0.5);
                border-color: #5a0a0a;
            }

        .msg-from {
            font-family: 'Cinzel',serif;
            font-size: 0.62rem;
            letter-spacing: 0.08em;
            color: var(--gold-dim);
            margin-bottom: 0.2rem;
        }

        .msg-text {
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .msg-time {
            font-size: 0.6rem;
            color: var(--text-faint);
            margin-top: 0.2rem;
            text-align: right;
        }

        .chat-input-row {
            display: flex;
            gap: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border);
        }

        .chat-input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 0.6rem 0.75rem;
            color: var(--text);
            font-family: 'IM Fell English',serif;
            font-size: 0.9rem;
            outline: none;
            resize: none;
            line-height: 1.4;
        }

            .chat-input:focus {
                border-color: var(--gold-dim);
            }

        .chat-send {
            background: var(--surface2);
            border: 1px solid var(--gold-dim);
            border-radius: 3px;
            padding: 0.6rem 0.85rem;
            color: var(--gold);
            font-family: 'Cinzel',serif;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .dm-to {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 0.35rem 0.5rem;
            color: var(--text);
            font-family: 'IM Fell English',serif;
            font-size: 0.8rem;
            outline: none;
            margin-bottom: 0.5rem;
            width: 100%;
        }

        .role-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: linear-gradient(160deg,#0d0908 0%,#1a0d14 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .role-card {
            background: var(--surface);
            border: 2px solid var(--gold-dim);
            border-radius: 6px;
            padding: 2rem 1.5rem;
            text-align: center;
            max-width: 320px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

            .role-card::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 2px;
                background: linear-gradient(to right,transparent,var(--gold),transparent);
            }

            .role-card::after {
                content: '';
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                height: 2px;
                background: linear-gradient(to right,transparent,var(--gold),transparent);
            }

        .role-card-char {
            font-family: 'Cinzel',serif;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
        }

        .role-card-name {
            font-family: 'Cinzel Decorative',serif;
            font-size: 1.6rem;
            color: var(--gold);
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }

        .role-card-role {
            font-family: 'Cinzel',serif;
            font-size: 1.1rem;
            letter-spacing: 0.15em;
            margin-bottom: 0.3rem;
        }

            .role-card-role.evil {
                color: var(--crimson-pale);
            }

            .role-card-role.good {
                color: var(--good-bright);
            }

        .role-card-align {
            font-size: 0.8rem;
            margin-bottom: 1.5rem;
            color: var(--text-dim);
            font-style: italic;
        }

        .role-card-teammates {
            font-size: 0.82rem;
            color: var(--crimson-pale);
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .role-hide-btn {
            padding: 0.7rem 1.5rem;
            background: var(--surface2);
            border: 1px solid var(--border-gold);
            border-radius: 3px;
            color: var(--gold-dim);
            font-family: 'Cinzel',serif;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 190;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;

<body>
    <div class="app" id="app">
        <div class="topbar">
            <div class="phase-pill" id="phase-pill">Waiting...</div>
            <div class="timer-badge" id="timer-badge">—</div>
            <button class="role-btn" id="role-btn" onclick="showRoleModal()" title="View your role">🎭</button>
            <button class="role-btn" onclick="window.open('rules.html','_blank')" title="Rules">📋</button>
            <button class="role-btn" id="admin-btn" onclick="openAdmin()" style="display:none">⚙️</button>
        </div>

        <div class="pages" id="pages">
            <div class="page active" id="page-journal">
                <div class="page-inner" id="journal-content">
                    <div style="text-align:center;padding:2rem;color:var(--text-dim);font-style:italic;">Waiting for game to begin...</div>
                </div>
            </div>
            <div class="page slide-right" id="page-tracker">
                <div class="page-inner" id="tracker-content">
                    <div style="text-align:center;padding:2rem;color:var(--text-dim);font-style:italic;">Waiting for game to begin...</div>
                </div>
            </div>
            <div class="page slide-right" id="page-chat">
                <div class="page-inner" style="padding-bottom:10px;">
                    <div class="chat-wrapper" id="chat-wrapper">
                        <div class="chat-tabs">
                            <button class="chat-tab active" onclick="switchChatTab('global')">Town <span class="unread hidden" id="unread-global">0</span></button>
                            <button class="chat-tab" onclick="switchChatTab('evil')" id="evil-tab" style="display:none">Evil <span class="unread hidden" id="unread-evil">0</span></button>
                            <button class="chat-tab" onclick="switchChatTab('dm')">Private <span class="unread hidden" id="unread-dm">0</span></button>
                        </div>
                        <div id="chat-global-area" style="display:flex;flex-direction:column;flex:1;">
                            <div class="messages" id="messages-global"></div>
                            <div class="chat-input-row">
                                <textarea class="chat-input" id="chat-input-global" placeholder="Speak your mind..." rows="1" onkeydown="chatKeydown(event,'global')"></textarea>
                                <button class="chat-send" onclick="sendChat('global')">Send</button>
                            </div>
                        </div>
                        <div id="chat-evil-area" style="display:none;flex-direction:column;flex:1;">
                            <div class="messages" id="messages-evil"></div>
                            <div class="chat-input-row">
                                <textarea class="chat-input" id="chat-input-evil" placeholder="Conspire in secret..." rows="1" onkeydown="chatKeydown(event,'evil')"></textarea>
                                <button class="chat-send" onclick="sendChat('evil')">Send</button>
                            </div>
                        </div>
                        <div id="chat-dm-area" style="display:none;flex-direction:column;flex:1;">
                            <select class="dm-to" id="dm-target"><option value="">Select a player...</option></select>
                            <div class="messages" id="messages-dm"></div>
                            <div class="chat-input-row">
                                <textarea class="chat-input" id="chat-input-dm" placeholder="Private message..." rows="1" onkeydown="chatKeydown(event,'dm')"></textarea>
                                <button class="chat-send" onclick="sendChat('dm')">Send</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="page-tabs">
            <button class="page-tab active" onclick="switchPage(0)"><span class="tab-icon">📖</span>Journal</button>
            <button class="page-tab" onclick="switchPage(1)"><span class="tab-icon">🗺</span>Tracker</button>
            <button class="page-tab" onclick="switchPage(2)" id="chat-tab-btn"><span class="tab-icon">💬</span>Chat</button>
        </div>
    </div>

    <!-- Role reveal overlay -->
    <div class="role-overlay hidden" id="role-overlay">
        <div class="role-card">
            <div class="role-card-char" id="ro-char"></div>
            <div class="role-card-name" id="ro-name"></div>
            <div class="role-card-role" id="ro-role"></div>
            <div class="role-card-align" id="ro-align"></div>
            <div class="role-card-teammates" id="ro-teammates"></div>
            <div id="ro-pool-card" style="margin-top:1rem;background:var(--surface2);border:1px solid var(--border-gold);border-radius:4px;padding:1rem;width:100%;text-align:left;">
                <div style="font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.18em;color:var(--gold);margin-bottom:0.6rem;">ROLES IN PLAY</div>
                <div id="ro-pool" style="font-size:0.82rem;line-height:1.8;"></div>
            </div>
            <button class="role-hide-btn" onclick="hideRoleOverlay()">Hold to hide your role →</button>
        </div>
    </div>

    <!-- Role peek modal -->
    <div class="modal-overlay hidden" id="role-modal">
        <div class="modal">
            <div class="modal-title">YOUR ROLE</div>
            <div id="role-modal-content"></div>
            <button class="modal-close" onclick="closeRoleModal()">Close</button>
        </div>
    </div>

    <!-- Admin panel -->
    <div class="admin-panel" id="admin-panel">
        <div class="admin-inner">
            <div class="admin-header">
                <div class="admin-title">🕵 Host Panel</div>
                <button class="admin-close" onclick="closeAdmin()">Close</button>
            </div>
            <div id="admin-content"></div>
        </div>
    </div>

    <!-- Game over -->
    <div class="gameover hidden" id="gameover">
        <div class="gameover-title" id="go-title">Good Wins!</div>
        <div class="gameover-sub" id="go-sub"></div>
        <div class="survivors" id="go-survivors" style="max-height:50vh;overflow-y:auto;"></div>
        <div id="go-event-log" style="display:none;width:100%;max-width:320px;max-height:40vh;overflow-y:auto;"></div>
        <div id="go-char-summary" style="display:none;width:100%;max-width:320px;"></div>
        <div id="go-tabs" style="display:flex;gap:0.5rem;margin-top:1rem;width:100%;max-width:320px;">
            <button onclick="switchGoTab('scores')" class="go-tab active" id="go-tab-scores">Scores</button>
            <button onclick="switchGoTab('log')" class="go-tab" id="go-tab-log">Event Log</button>
            <button onclick="switchGoTab('summary')" class="go-tab" id="go-tab-summary">My Summary</button>
        </div>
        <div id="go-host-controls" style="display:none;width:100%;max-width:320px;margin-top:1rem;">
            <div style="font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:0.15em;color:var(--text-dim);margin-bottom:0.75rem;">HOST OPTIONS</div>
            <button class="gameover-btn" style="width:100%;margin-bottom:0.5rem;" onclick="hostNewGame(true)">Continue — Keep Points</button>
            <button class="gameover-btn" style="width:100%;margin-bottom:0.5rem;background:linear-gradient(135deg,#1a3a1a,#0a1a0a);" onclick="hostNewGame(false)">Continue — Reset Points</button>
            <button class="gameover-btn" style="width:100%;background:transparent;border-color:var(--border);color:var(--text-dim);" onclick="hostEndSession()">End Session</button>
        </div>
        <div id="go-guest-msg" style="margin-top:1rem;font-style:italic;color:var(--text-dim);font-size:0.85rem;">Waiting for host to continue...</div>
    </div>

    <div class="notif" id="notif"></div>

    <!-- Death popup -->
    <div class="modal-overlay hidden" id="death-modal">
        <div class="modal">
            <div class="modal-title" style="color:var(--crimson-pale)">☩ YOU HAVE DIED</div>
            <div id="death-modal-content" style="font-size:0.9rem;color:var(--text-dim);margin-bottom:1rem;font-style:italic;"></div>
            <button class="modal-close" onclick="document.getElementById('death-modal').classList.add('hidden')">Close</button>
        </div>
    </div>

    <script>
        // ─── Config ───────────────────────────────────────────────────────────────────
        const PARTYKIT_HOST = "murder-mystery.kizuruki.partykit.dev"; // ← replace for local: "localhost:1999"

        const ALL_ROLES = ["Murderer", "Assassin", "Spy", "Witch", "Doctor", "Detective", "Judge", "Mayor", "Psychic", "Medium", "Coroner", "Jailor", "Vigilante", "Civilian"];
        const EVIL_ROLES = ["Murderer", "Assassin", "Spy", "Witch"];
        const ROLE_ICONS = { Murderer: "🔪", Assassin: "⚔️", Spy: "🔭", Witch: "🧙", Doctor: "💉", Detective: "🔍", Judge: "⚖️", Mayor: "🏛", Psychic: "🔮", Medium: "👁", Coroner: "🏥", Jailor: "⛓", Vigilante: "🏹", Civilian: "🧑" };

        // ─── State ────────────────────────────────────────────────────────────────────
        const params = new URLSearchParams(location.search);
        const roomCode = params.get('room') || sessionStorage.getItem('mm_room_code') || '';
        const nickname = sessionStorage.getItem('mm_nickname') || 'Guest';
        const gender = sessionStorage.getItem('mm_gender') || 'either';
        let ws = null;
        let myId = null;
        let gameState = null;
        let isHost = false;
        let me = null;

        let currentPage = 0;
        let currentChatTab = 'global';
        let unreadCounts = { global: 0, evil: 0, dm: 0 };

        let nightActionTarget = undefined; // undefined = not yet selected; null = skip/don't act
        let nightActionSecondary = null;
        let voteTarget = undefined;
        let judgeSaveTarget = null;
        let nightActionSubmitted = false;
        let voteSubmitted = false;

        // Objective picker state
        let activeObjPicker = -1; // index of objective showing inline picker

        let timerDisplayInterval = null;
        let timerTickInterval = null; // host-only: drives server phase advancement

        // ─── WebSocket ────────────────────────────────────────────────────────────────
        function hostNewGame(keepPoints) {
            send({ type: 'host_new_game', keepPoints });
        }
        function hostEndSession() {
            send({ type: 'host_end_session' });
        }

        function connect() {
            const protocol = PARTYKIT_HOST.startsWith('localhost') ? 'ws' : 'wss';
            const url = `${PARTYKIT_HOST.startsWith('localhost') ? 'ws' : 'wss'}://${PARTYKIT_HOST}/party/${roomCode.toLowerCase()}`;
            ws = new WebSocket(url);
            ws.onopen = () => {
                const charId = sessionStorage.getItem('mm_char_id');
                const nick = sessionStorage.getItem('mm_nickname') || 'Guest';
                if (charId) send({ type: 'join', characterId: charId, nickname: nick, gender: sessionStorage.getItem('mm_gender') || 'either' });
                send({ type: 'request_state' });
            };
            ws.onmessage = (e) => { try { handleMessage(JSON.parse(e.data)); } catch (err) { console.error(err); } };
            ws.onclose = () => { setTimeout(connect, 2000); };
            ws.onerror = () => ws.close();
        }

        function send(msg) {
            if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg));
        }

        function switchGoTab(tab) {
            document.querySelectorAll('.go-tab').forEach(b => b.classList.remove('active'));
            document.getElementById('go-tab-' + tab).classList.add('active');
            document.getElementById('go-survivors').style.display = tab === 'scores' ? 'block' : 'none';
            document.getElementById('go-event-log').style.display = tab === 'log' ? 'block' : 'none';
            document.getElementById('go-char-summary').style.display = tab === 'summary' ? 'block' : 'none';
        }

        // ─── Message Handling ─────────────────────────────────────────────────────────
        function handleMessage(msg) {
            switch (msg.type) {
                case 'state_update': {
                    const prevPhase = gameState?.phase;
                    gameState = msg;
                    myId = msg.myId;
                    isHost = msg.isHost;
                    me = gameState.players[myId];

                    // Ensure trackerMarks and trackerRoles are always objects client-side
                    if (me) {
                        me.trackerMarks = me.trackerMarks || {};
                        me.trackerRoles = me.trackerRoles || {};
                    }

                    if (prevPhase !== msg.phase) onPhaseChange(prevPhase, msg.phase);
                    render();

                    // Host drives timer — start/restart tick interval
                    if (isHost) startHostTimerTick();
                    break;
                }
                case 'chat':
                    appendChatMessage(msg.message);
                    break;
                case 'redirect_lobby':
                    sessionStorage.setItem('mm_room_code', msg.roomCode);
                    window.location.href = 'lobby.html?room=' + msg.roomCode + (isHost ? '&host=1' : '');
                    break;
                case 'session_ended':
                    window.location.href = 'index.html';
                    break;
                case 'action_received':
                    showNotif('Action submitted ✓');
                    break;
                case 'clue_found':
                    showNotif(`🔍 Clue found!`);
                    break;
                case 'clue_shared':
                    showNotif(`📢 ${msg.sharedBy} shared a clue`);
                    if (msg.sharedBy !== (me && me.name) && me) {
                        me.feedbackLog = me.feedbackLog || [];
                        me.feedbackLog.push({ round: gameState.round, phase: 'night', text: `📢 ${msg.sharedBy} shared a clue: "${msg.clueText}"` });
                        renderJournal();
                    }
                    break;
                case 'error':
                    showNotif('⚠ ' + msg.message);
                    break;
            }
        }

        // ─── Host Timer Tick ──────────────────────────────────────────────────────────
        // Only the host sends timer_tick to the server every second.
        // The server advances the phase when it sees the timer has expired.
        function startHostTimerTick() {
            if (!isHost) return;
            if (timerTickInterval) clearInterval(timerTickInterval);
            timerTickInterval = setInterval(() => {
                if (!gameState || gameState.gameOver || gameState.timerPaused) return;
                if (!gameState.timerEndsAt) return;
                send({ type: 'timer_tick' });
            }, 1000);
        }

        // ─── Phase Change ─────────────────────────────────────────────────────────────
        function onPhaseChange(from, to) {
            // Check if we just died
            if (from === 'night_action' && to === 'night_feedback' && gameState && me) {
                const freshMe = gameState.players[myId];
                if (freshMe && !freshMe.alive && me.alive) {
                    // We died this night
                    document.getElementById('death-modal-content').textContent = 'You have been eliminated. You may still observe the game.';
                    document.getElementById('death-modal').classList.remove('hidden');
                }
            }
            nightActionTarget = undefined;
            nightActionSecondary = null;
            voteTarget = undefined;
            judgeSaveTarget = null;
            nightActionSubmitted = false;
            voteSubmitted = false;
            activeObjPicker = -1;

            if (to === 'role_reveal') showRoleOverlay();
            if (to === 'game_over') showGameOver();
        }

        // ─── Main Render ──────────────────────────────────────────────────────────────
        function render() {
            if (!gameState || !me) return;
            const prevMe = me ? { ...me, feedbackLog: [...(me.feedbackLog || [])] } : null;
            me = gameState.players[myId];
            if (prevMe && me) {
                const newEntries = (me.feedbackLog || []).slice(prevMe.feedbackLog?.length || 0);
                newEntries.forEach(e => {
                    if (e.text.startsWith('🔍')) showNotif('🔍 You discovered a hidden clue!');
                });
            }
            if (!me) return;
            me.trackerMarks = me.trackerMarks || {};
            me.trackerRoles = me.trackerRoles || {};

            document.getElementById('admin-btn').style.display = isHost ? 'flex' : 'none';
            const guestMsg = document.getElementById('go-guest-msg');
            if (guestMsg) guestMsg.style.display = isHost ? 'none' : 'block';
            const pill = document.getElementById('phase-pill');
            const phaseLabels = { lobby: 'Lobby', role_reveal: 'Role Reveal', day: 'Day', discussion: 'Discussion', voting: 'Voting', judge_save: 'Judge Save', night_action: 'Night', night_feedback: 'Night Feedback', game_over: 'Game Over', scoring: 'Scoring' };
            const nightPhases = ['night_action', 'night_feedback'];
            const dayPhases = ['day', 'discussion', 'voting', 'judge_save'];
            const roundLabel = ['discussion', 'voting', 'judge_save', 'night_action', 'night_feedback'].includes(gameState.phase)
                ? ` · R${gameState.round}` : '';
            pill.textContent = (phaseLabels[gameState.phase] || gameState.phase) + roundLabel;
            pill.className = 'phase-pill' + (nightPhases.includes(gameState.phase) ? ' night' : dayPhases.includes(gameState.phase) ? ' day' : '');

            startTimerDisplay();

            if (me && EVIL_ROLES.includes(me.role)) document.getElementById('evil-tab').style.display = 'block';

            renderDMSelector();
            renderJournal();
            renderTracker();
            // Disable chat inputs for dead players
            const isDead = me && !me.alive;
            ['global', 'evil', 'dm'].forEach(channel => {
                const input = document.getElementById(`chat-input-${channel}`);
                const btn = input?.nextElementSibling;
                if (input) { input.disabled = isDead; input.placeholder = isDead ? 'The dead cannot speak...' : (channel === 'dm' ? 'Private message...' : channel === 'evil' ? 'Conspire in secret...' : 'Speak your mind...'); }
            });
            if (document.getElementById('admin-panel').classList.contains('open')) renderAdminContent();
            if (gameState.gameOver) showGameOver();
        }

        // ─── Timer Display ────────────────────────────────────────────────────────────
        function startTimerDisplay() {
            if (timerDisplayInterval) clearInterval(timerDisplayInterval);
            const badge = document.getElementById('timer-badge');
            if (!gameState || !gameState.timerEndsAt) { badge.textContent = '—'; badge.className = 'timer-badge'; return; }

            function update() {
                if (!gameState) return;
                if (gameState.timerPaused) { badge.textContent = '⏸'; badge.className = 'timer-badge'; return; }
                if (!gameState.timerEndsAt) { badge.textContent = '—'; badge.className = 'timer-badge'; return; }
                const rem = Math.max(0, Math.ceil((gameState.timerEndsAt - Date.now()) / 1000));
                const m = Math.floor(rem / 60);
                const s = rem % 60;
                badge.textContent = m > 0 ? `${m}:${s.toString().padStart(2, '0')}` : `${s}s`;
                badge.className = 'timer-badge' + (rem <= 10 ? ' urgent' : '');
            }
            update();
            timerDisplayInterval = setInterval(update, 500);
        }

        // ─── Journal Page ─────────────────────────────────────────────────────────────
        function renderJournal() {
            if (!me) return;
            const container = document.getElementById('journal-content');
            const phase = gameState.phase;
            let html = '';
            if (gameState.lastVoteOutcome && ['discussion', 'night_action', 'night_feedback'].includes(phase)) {
                html += `<div class="death-banner" style="border-color:var(--gold-dim);">
                  <div class="death-name" style="color:var(--gold);font-size:0.85rem;">🗳 ${gameState.lastVoteOutcome}</div>

            if (phase === 'night_feedback') {
                // Show night deaths that just happened
                roundDeaths = gameState.deathLog.filter(d => d.round === gameState.round && d.isNightDeath);

                // Show night deaths from previous round at start of day
                roundDeaths = gameState.deathLog.filter(d => d.round === gameState.round - 1 && d.isNightDeath);

            // Vote-outs are already shown via lastVoteOutcome banner above — don't duplicate them
            roundDeaths.forEach(d => {
                html += `<div class="death-banner"><div class="death-name">☩ ${d.playerName} died last night.</div></div>`;

            const actionHtml = renderActionPanel();

            <div class="card-header"><span class="card-title">Character</span></div>
            <div class="card-body">

              ${!me.alive ? '<div style="color:var(--crimson-pale);font-size:0.8rem;font-style:italic;margin-bottom:0.5rem;">☩ You have been eliminated</div>' : ''}

              <div style="margin-bottom:0.5rem;font-size:0.82rem;"><span style="color:var(--text-dim)">Likes: </span>${(me.likes || []).map(l => `<span class="pref-tag like">${l}</span>`).join('')}</div>
              <div style="font-size:0.82rem;"><span style="color:var(--text-dim)">Dislikes: </span>${(me.dislikes || []).map(d => `<span class="pref-tag dislike">${d}</span>`).join('')}</div>
            </div>
          </div>`;

            // Objectives — with inline player picker
            const objs = me.objectives || [];
            const objDone = me.objectivesCompleted || [false, false, false];
            if (objs.length > 0) {
                const sel = me.objectiveSelections || [null, null];
                const alivePlayers = Object.values(gameState.players).filter(p => p.id !== myId);
                html += `<div class="card">
                  <div class="card-header"><span class="card-title">Objectives</span><span style="font-size:0.7rem;color:var(--text-dim)">Verified at game end</span></div>
                  <div class="card-body">`;
                objs.forEach((obj, i) => {

                            <div class="obj-check" style="cursor:default">3</div>
                            <div style="flex:1">${obj}</div>
                          </div>
                        </div>`;
                        return;
                    }
                    const selectedId = sel[i];
                    const selectedPlayer = selectedId ? gameState.players[selectedId] : null;
                    html += `<div class="obj-item">
                      <div class="obj-item-row">

                startClues.forEach(c => {
                    const isDetective = me.role === 'Detective';
                    const labelHtml = isDetective ? `<div class="clue-label">${c.isReal ? '✓ REAL' : '✗ FALSE'}</div>` : '';
                    const cls = isDetective ? (c.isReal ? 'real' : 'fake') : '';
                    html += `<div class="clue-item ${cls}">${labelHtml}${c.text}</div>`;

            const discovered = me.discoveredClues || [];

                    html += `<div class="clue-item">${clueText}<br>
                <button class="clue-share-btn ${shared ? 'shared' : ''}" onclick="shareClue('${safeText}')">

                </button></div>`;
                });
                html += `</div></div>`;
            }

            // Physical clue code entry
            if (gameState.settings?.clueMode === 'physical') {
                html += `<div class="card"><div class="card-header"><span class="card-title">Enter Clue Code</span></div><div class="card-body">
              <div style="font-size:0.82rem;color:var(--text-dim);margin-bottom:0.5rem;font-style:italic;">Found a code on a hidden note? Enter it here.</div>
              <div class="code-entry">

            const feedbackLog = me.feedbackLog || [];
            if (feedbackLog.length > 0) {
                html += `<div class="card"><div class="card-header"><span class="card-title">Feedback Log</span></div><div class="card-body">`;
                [...feedbackLog].reverse().forEach(f => {
                    html += `<div class="feedback-item"><div class="feedback-round">Round ${f.round} · ${f.phase === 'night' ? '🌙 Night' : '☀️ Day'}</div>${f.text}</div>`;

            html += `<div class="card"><div class="card-header"><span class="card-title">Notes</span></div><div class="card-body">
            <textarea class="notes-textarea" id="notes-area" placeholder="Write your notes here... (private)" onblur="saveNotes()">${(me.notes || '').replace(/</g, '&lt;')}</textarea>

        // ─── Objective Handling ───────────────────────────────────────────────────────
        function updateObjSelection(index, targetId) {
            send({ type: 'update_objective_selection', objectiveIndex: index, targetPlayerId: targetId || null });
            if (me) {
                if (!me.objectiveSelections) me.objectiveSelections = [null, null];
                me.objectiveSelections[index] = targetId || null;
            }
        }
        function handleObjectiveClick(index) {
            if (!me) return;
            const isDone = me.objectivesCompleted[index];
            if (isDone) return; // already done, can't undo

            if (index === 2) {
                // Objective 3 is auto-completed by others; can't self-complete
                showNotif('This objective completes when someone marks you');
                return;
            }

            // Toggle inline picker for objectives 0 and 1
            activeObjPicker = activeObjPicker === index ? -1 : index;
            renderJournal();
        }

        function completeObjective(objectiveIndex, targetPlayerId) {
            activeObjPicker = -1;
            send({ type: 'objective_complete', objectiveIndex, targetPlayerId });
            // Optimistic update
            if (me) me.objectivesCompleted[objectiveIndex] = true;
            renderJournal();
        }

        // ─── Action Panel ─────────────────────────────────────────────────────────────
        function renderActionPanel() {
            if (!me || !me.alive) return '';
            const phase = gameState.phase;
            if (phase === 'night_action') {
                if (!gameState.myActionExpected) {
                    return `<div class="action-panel"><div class="action-header">☾ NIGHT — No action required</div><div class="action-body" style="color:var(--text-dim);font-style:italic;">Rest and wait for morning.</div></div>`;
                }
                return renderNightActionPanel();
            }
            if (phase === 'voting') return renderVotingPanel();
            return '';
        }

            const role = me.role;

            // Witch Night 1: no current mimic, just pick next mimic
            if (role === 'Witch' && !me.witchCurrentMimic) {
                const mimicHistory = me.witchMimicHistory || [];
                const allMimicable = ["Murderer","Doctor","Detective","Judge","Mayor","Psychic","Medium","Coroner","Spy","Jailor"];

                return `<div class="action-panel">
                    <div class="action-header">☾ NIGHT — Witch (choose first mimic)</div>

                        <select onchange="nightActionSecondary=this.value" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:0.6rem;color:var(--text);font-family:'IM Fell English',serif;font-size:0.9rem;outline:none;">
                            <option value="">Choose role to mimic next...</option>
                            ${available.map(r => `<option value="${r}">${ROLE_ICONS[r]||''} ${r}</option>`).join('')}

                const mimicHistory = me.witchMimicHistory || [];
                const allMimicable = ["Murderer","Doctor","Detective","Judge","Mayor","Psychic","Medium","Coroner","Spy","Jailor"];
                const available = allMimicable.filter(r => !mimicHistory.includes(r));
                return `<div class="action-panel">
                    <div class="action-header">☾ NIGHT — Witch (${me.witchCurrentMimic} is a day role)</div>
                    <div class="action-body">
                        <div style="font-size:0.82rem;color:var(--text-dim);font-style:italic;margin-bottom:0.75rem;">Your current mimic (${me.witchCurrentMimic}) acts during the day. Choose your next mimic.</div>
                        <select onchange="nightActionSecondary=this.value" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:0.6rem;color:var(--text);font-family:'IM Fell English',serif;font-size:0.9rem;outline:none;">
                            <option value="">Choose role to mimic next...</option>
                            ${available.map(r => `<option value="${r}">${ROLE_ICONS[r]||''} ${r}</option>`).join('')}

                    </div>
                </div>`;
            }

                return `<div class="action-panel"><div class="action-header">☾ NIGHT — Action Submitted</div><div class="action-body"><div class="submit-btn submitted">✓ Waiting for others...</div></div></div>`;

            const roleDescs = {
                Murderer: 'Choose someone to kill tonight.',
                Assassin: 'Use your one unblockable kill, or save it.',
                Spy: 'Choose someone to spy on.',
                Witch: `Choose your target for your current ability (${me.witchCurrentMimic}). Also pick your next mimic.`,
                Doctor: 'Choose someone to protect tonight.',
                Detective: 'Choose a house to watch tonight.',
                Jailor: 'Choose someone to jail tonight.',
                Vigilante: 'Use your one-shot kill now, or wait.',
                Psychic: 'Choose someone to receive a vision about.',
                Medium: 'Choose a dead player to learn their role.',
            };

            const alivePlayers = Object.values(gameState.players).filter(p => p.alive && p.id !== myId);
            const targetPool = role === 'Medium' ? Object.values(gameState.players).filter(p => !p.alive) : alivePlayers;

            let html = `<div class="action-panel">
                <div class="action-header">☾ NIGHT — ${role}</div>
                <div class="action-body">
                    <div style="font-size:0.82rem;color:var(--text-dim);font-style:italic;margin-bottom:0.75rem;">${roleDescs[role] || ''}</div>
                    <div class="player-picker">`;

            if (!['Assassin','Vigilante'].includes(role)) {
                html += `<div class="picker-item${nightActionTarget === null ? ' selected' : ''}" onclick="selectNightTarget(null)">
                    <div><div class="picker-item-name">No action</div><div class="picker-item-sub">Skip this night</div></div></div>`;
            } else {
                html += `<div class="picker-item${nightActionTarget === null ? ' selected' : ''}" onclick="selectNightTarget(null)">
                    <div><div class="picker-item-name">Don't use</div><div class="picker-item-sub">Save for later</div></div></div>`;
            }

            targetPool.forEach(p => {
                const isLastSaved = role === 'Doctor' && me.doctorLastSaved === p.id;
                const alreadyJailed = role === 'Jailor' && (me.jailedHistory || []).includes(p.id);
                if (isLastSaved || alreadyJailed) return;
                html += `<div class="picker-item${nightActionTarget === p.id ? ' selected' : ''}" onclick="selectNightTarget('${p.id}')">
                    <div><div class="picker-item-name">${p.name}</div><div class="picker-item-sub">${p.nickname}</div></div></div>`;
            });

            html += `</div>`;

            if (role === 'Witch') {
                const mimicHistory = me.witchMimicHistory || [];
                const allMimicable = ["Murderer","Doctor","Detective","Judge","Mayor","Psychic","Medium","Coroner","Spy","Jailor"];
                const available = allMimicable.filter(r => !mimicHistory.includes(r));
                html += `<div style="margin-top:1rem;">
                    <div style="font-family:'Cinzel',serif;font-size:0.68rem;letter-spacing:0.15em;color:var(--gold);margin-bottom:0.5rem;">NEXT MIMIC</div>
                    <select onchange="nightActionSecondary=this.value" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:0.6rem;color:var(--text);font-family:'IM Fell English',serif;font-size:0.9rem;outline:none;">
                        <option value="">Choose role to mimic next...</option>
                        ${available.map(r => `<option value="${r}">${ROLE_ICONS[r]||''} ${r}</option>`).join('')}
                    </select>
                    <div style="font-size:0.72rem;color:var(--text-dim);margin-top:0.35rem;font-style:italic;">Already mimicked: ${mimicHistory.join(', ') || 'none'}</div>
                </div>`;
            }

            html += `<button class="submit-btn" onclick="submitNightAction()" ${nightActionTarget === undefined ? 'disabled' : ''}>Submit Night Action</button>`;
            html += `</div></div>`;
            return html;
        }

        function renderVotingPanel() {
            if (voteSubmitted) {
                return `<div class="action-panel"><div class="action-header">☀ VOTING — Submitted</div><div class="action-body"><div class="submit-btn submitted">✓ Vote cast</div></div></div>`;

            <div class="action-header">☀ VOTING${myVotePower > 1 ? ' — Double Vote' : ''}</div>
            <div class="action-body">
              <div style="font-size:0.82rem;color:var(--text-dim);font-style:italic;margin-bottom:0.75rem;">
                Vote to eliminate a suspect.${myVotePower > 1 ? ` Your vote counts as ${myVotePower}` : ''}</div>
              <div class="player-picker">
                <div class="picker-item${voteTarget === null ? ' selected' : ''}" onclick="selectVote(null)">
                  <div><div class="picker-item-name">Skip vote</div><div class="picker-item-sub">Don't eliminate anyone</div></div></div>`;

            players.forEach(p => {
                if (p.id === myId) return;

              <select onchange="selectJudgeSave(this.value)" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:0.6rem;color:var(--text);font-family:'IM Fell English',serif;font-size:0.9rem;outline:none;">
