        // ─── Tracker Page ─────────────────────────────────────────────────────────────
        function renderTracker() {
            const container = document.getElementById('tracker-content');
            if (!gameState) return;
            const players = Object.values(gameState.players);
            if (players.length === 0) { container.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-dim);font-style:italic;">No players yet...</div>'; return; }

            // Always use safe fallbacks for tracker data
            const marks = (me && me.trackerMarks) ? me.trackerMarks : {};
            const guessedRoles = (me && me.trackerRoles) ? me.trackerRoles : {};

            let html = `<div class="card"><div class="card-header"><span class="card-title">Suspect Board</span></div><div class="card-body">
            <div style="font-size:0.75rem;color:var(--text-dim);font-style:italic;margin-bottom:0.75rem;">Tap ◉ to mark suspicious, ✕ to mark safe. Guess their role.</div>
            <div class="tracker-list">`;

            players.forEach(p => {
                const mark = marks[p.id] || 'none';
                const guessedRole = guessedRoles[p.id] || '';
                const isDead = !p.alive;
                const isMe = p.id === myId;
                html += `<div class="tracker-item${isDead ? ' dead' : ''}${mark === 'circle' ? ' circled' : ''}${mark === 'x' ? ' xed' : ''}">
              <div class="tracker-name">
                <div class="tracker-char-name${isDead ? ' dead-x' : ''}">${p.name}${isMe ? ' (you)' : ''}</div>
                <div class="tracker-nickname">${p.nickname}</div>
              </div>
                ${!isMe ? (
                        (me && EVIL_ROLES.includes(me.role) && EVIL_ROLES.includes(p.role || ''))
                            ? `<span style="font-family:'Cinzel',serif;font-size:0.72rem;color:var(--crimson-pale)">${p.role} (evil)</span>`
                            : `<select class="tracker-role-guess" onchange="updateTrackerRole('${p.id}',this.value)">
                        <option value="">Role?</option>
                        ${ALL_ROLES.map(r => `<option value="${r}"${guessedRole === r ? ' selected' : ''}>${r}</option>`).join('')}
                       </select>`
                    ) : ''}
              ${!isMe ? `<div class="tracker-marks">
                <button class="mark-btn${mark === 'circle' ? ' circle-active' : ''}" onclick="toggleMark('${p.id}','circle')">◉</button>
                <button class="mark-btn${mark === 'x' ? ' x-active' : ''}" onclick="toggleMark('${p.id}','x')">✕</button>
              </div>`: ''}
            </div>`;
            });

            html += `</div></div></div>`;

            if (gameState.deathLog && gameState.deathLog.length > 0) {
                html += `<div class="card"><div class="card-header"><span class="card-title">Death Record</span></div><div class="card-body">`;
                [...gameState.deathLog].reverse().forEach(d => {
                    html += `<div class="feedback-item"><div class="feedback-round">Round ${d.round}</div><strong>${d.playerName}</strong> — ${d.cause}</div>`;
                });
                html += `</div></div>`;
            }

            container.innerHTML = html;
        }

        // ─── Chat ─────────────────────────────────────────────────────────────────────
        function appendChatMessage(msg) {
            if (!msg) return;
            const channel = msg.to === 'global' ? 'global' : msg.to === 'evil' ? 'evil' : 'dm';
            const containerId = `messages-${channel}`;
            const container = document.getElementById(containerId);
            if (!container) return;

            const div = document.createElement('div');
            const isMine = msg.from === myId;
            div.className = `msg${isMine ? ' mine' : ''}${msg.to === 'evil' ? ' evil' : ''}`;
            const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            div.innerHTML = `<div class="msg-from">${isMine ? 'You' : escapeHtml(msg.fromName)}</div>
            <div class="msg-text">${escapeHtml(msg.text)}</div>
            <div class="msg-time">${time}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;

            if (currentPage !== 2 || currentChatTab !== channel) {
                if (channel === 'global') unreadCounts.global++;
                else if (channel === 'evil') unreadCounts.evil++;
                else unreadCounts.dm++;
                updateUnreadBadges();
            }
        }

        function switchChatTab(tab) {
            currentChatTab = tab;
            ['global', 'evil', 'dm'].forEach(t => {
                document.getElementById(`chat-${t}-area`).style.display = t === tab ? 'flex' : 'none';
            });
            document.querySelectorAll('.chat-tab').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.trim().toLowerCase().startsWith(tab));
            });
            if (tab === 'global') unreadCounts.global = 0;
            else if (tab === 'evil') unreadCounts.evil = 0;
            else unreadCounts.dm = 0;
            updateUnreadBadges();
        }

        function updateUnreadBadges() {
            ['global', 'evil', 'dm'].forEach(t => {
                const el = document.getElementById(`unread-${t}`);
                if (!el) return;
                el.textContent = unreadCounts[t];
                el.classList.toggle('hidden', unreadCounts[t] === 0);
            });
            const total = unreadCounts.global + unreadCounts.evil + unreadCounts.dm;
            const chatTabBtn = document.getElementById('chat-tab-btn');
            if (chatTabBtn) {
                let dot = chatTabBtn.querySelector('.unread-dot');
                if (total > 0 && !dot) {
                    dot = document.createElement('span');
                    dot.className = 'unread-dot';
                    dot.style.cssText = 'position:absolute;top:4px;right:8px;width:7px;height:7px;background:var(--crimson-bright);border-radius:50%;';
                    chatTabBtn.style.position = 'relative';
                    chatTabBtn.appendChild(dot);
                } else if (total === 0 && dot) {
                    dot.remove();
                }
            }
        }

        function renderDMSelector() {
            const sel = document.getElementById('dm-target');
            if (!sel || !gameState) return;
            const current = sel.value;
            sel.innerHTML = '<option value="">Select a player...</option>';
            Object.values(gameState.players).forEach(p => {
                if (p.id === myId || !p.alive) return;
                const opt = document.createElement('option');
                opt.value = p.id;
                opt.textContent = `${p.name} (${p.nickname})`;
                if (p.id === current) opt.selected = true;
                sel.appendChild(opt);
            });
        }

        function sendChat(channel) {
            if (!gameState?.settings?.chatEnabled) { showNotif('Chat is disabled'); return; }
            if (me && !me.alive) { showNotif('The dead cannot speak'); return; }
            let text, to;
            if (channel === 'global') {
                text = document.getElementById('chat-input-global').value.trim();
                to = 'global';
                document.getElementById('chat-input-global').value = '';
            } else if (channel === 'evil') {
                text = document.getElementById('chat-input-evil').value.trim();
                to = 'evil';
                document.getElementById('chat-input-evil').value = '';
            } else {
                text = document.getElementById('chat-input-dm').value.trim();
                to = document.getElementById('dm-target').value;
                document.getElementById('chat-input-dm').value = '';
                if (!to) { showNotif('Select a player first'); return; }
            }
            if (!text) return;
            send({ type: 'chat_message', to, text });
        }

        function chatKeydown(e, channel) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(channel); }
        }

        // ─── Actions ──────────────────────────────────────────────────────────────────
        function selectNightTarget(id) { nightActionTarget = id; renderJournal(); }

        function submitNightAction() {
            if (nightActionTarget === undefined) return;
            send({ type: 'night_action', targetId: nightActionTarget, secondaryTargetId: nightActionSecondary || null });
            nightActionSubmitted = true;
            renderJournal();
        }

        function selectVote(id) { voteTarget = id; renderJournal(); }

        function selectJudgeSave(id) {
            judgeSaveTarget = id || null;
            send({ type: 'judge_save', targetId: judgeSaveTarget });
        }

        function submitVote() {
            if (voteTarget === undefined) return;
            send({ type: 'submit_vote', targetId: voteTarget });
            if (judgeSaveTarget) send({ type: 'judge_save', targetId: judgeSaveTarget });
            voteSubmitted = true;
            renderJournal();
        }

        function saveNotes() {
            const textarea = document.getElementById('notes-area');
            if (textarea) send({ type: 'update_notes', notes: textarea.value });
        }

        function toggleMark(targetId, markType) {
            if (!me) return;
            if (!me.trackerMarks) me.trackerMarks = {};
            const current = me.trackerMarks[targetId] || 'none';
            const newMark = current === markType ? 'none' : markType;
            me.trackerMarks[targetId] = newMark; // optimistic update
            send({ type: 'update_tracker', targetId, mark: newMark });
            renderTracker();
        }

        function updateTrackerRole(targetId, role) {
            if (!me) return;
            if (!me.trackerRoles) me.trackerRoles = {};
            me.trackerRoles[targetId] = role; // optimistic update
            send({ type: 'update_tracker_role', targetId, role });
        }

        function enterClueCode() {
            const input = document.getElementById('clue-code-input');
            if (!input || !input.value.trim()) return;
            send({ type: 'enter_clue_code', code: input.value.trim() });
            input.value = '';
        }

        function shareClue(clueText) {
            send({ type: 'share_clue', clueText });
            if (me) {
                me.sharedClues = me.sharedClues || [];
                if (!me.sharedClues.includes(clueText)) me.sharedClues.push(clueText);
                renderJournal();
            }
        }

        // ─── Role Overlay ─────────────────────────────────────────────────────────────
        function showRoleOverlay() {
            if (!me) return;
            document.getElementById('ro-char').textContent = me.name;
            document.getElementById('ro-name').textContent = me.nickname;
            document.getElementById('ro-role').textContent = `${ROLE_ICONS[me.role] || ''} ${me.role}`;
            document.getElementById('ro-role').className = `role-card-role ${EVIL_ROLES.includes(me.role) ? 'evil' : 'good'}`;
            document.getElementById('ro-align').textContent = me.alignment;
            if (EVIL_ROLES.includes(me.role)) {
                const teammates = Object.values(gameState.players).filter(p => p.id !== myId && EVIL_ROLES.includes(p.role));
                document.getElementById('ro-teammates').textContent = teammates.length > 0 ? 'Evil team: ' + teammates.map(t => `${t.name} (${t.role})`).join(', ') : '';
            } else {
                document.getElementById('ro-teammates').textContent = '';
            }
            // Build pool display
            const settings = gameState.settings;
            document.getElementById('role-overlay').classList.remove('hidden');
            const pool = gameState.settings?.rolePool;
            const dist = gameState.defaultDistribution;
            let poolRoles = [];
            if (pool) {
                poolRoles = [
                    ...pool.evilRoles.map(r => `<span style="color:#c87070">${r}</span>`),
                    ...pool.goodRoles.map(r => `<span style="color:#4caf7a">${r}</span>`),
                    `<span style="color:var(--text-dim)">Civilian ×${pool.civilianCount}</span>`
                ];
            } else if (dist) {
                poolRoles = [
                    ...dist.evil.map(r => `<span style="color:#c87070">${r}</span>`),
                    ...dist.good.map(r => `<span style="color:#4caf7a">${r}</span>`),
                    `<span style="color:var(--text-dim)">Civilian ×${dist.civilians}</span>`
                ];
            }
            document.getElementById('ro-pool').innerHTML = poolRoles.join('<br>');
        }

        function hideRoleOverlay() { document.getElementById('role-overlay').classList.add('hidden'); }

        function showRoleModal() {
            if (!me) return;
            const content = document.getElementById('role-modal-content');
            const pool = gameState.settings?.rolePool;
            const dist = gameState.defaultDistribution;
            let poolRoles = [];
            if (pool) {
                poolRoles = [
                    ...pool.evilRoles.map(r => `<span style="color:#c87070">${r}</span>`),
                    ...pool.goodRoles.map(r => `<span style="color:#4caf7a">${r}</span>`),
                    `<span style="color:var(--text-dim)">Civilian ×${pool.civilianCount}</span>`
                ];
            } else if (dist) {
                poolRoles = [
                    ...dist.evil.map(r => `<span style="color:#c87070">${r}</span>`),
                    ...dist.good.map(r => `<span style="color:#4caf7a">${r}</span>`),
                    `<span style="color:var(--text-dim)">Civilian ×${dist.civilians}</span>`
                ];
            }
            content.innerHTML = `
                <div style="font-size:2rem;margin-bottom:0.5rem;">${ROLE_ICONS[me.role] || '?'}</div>
                <div style="font-family:'Cinzel',serif;font-size:1.1rem;color:${EVIL_ROLES.includes(me.role) ? 'var(--crimson-pale)' : 'var(--good-bright)'};margin-bottom:0.25rem;">${me.role}</div>
                <div style="font-size:0.82rem;color:var(--text-dim);font-style:italic;margin-bottom:0.75rem;">${me.alignment || ''}</div>
                ${EVIL_ROLES.includes(me.role) ? `<div style="font-size:0.78rem;color:var(--crimson-pale);margin-bottom:0.75rem;">
                  ${Object.values(gameState.players).filter(p => p.id !== myId && EVIL_ROLES.includes(p.role || '')).map(p => `${p.name}: ${p.role || '?'}`).join('<br>') || 'No other evil players known'}
                </div>` : ''}
                ${poolRoles.length ? `<div style="margin-top:0.5rem;background:var(--surface2);border:1px solid var(--border-gold);border-radius:4px;padding:0.75rem;text-align:left;">
                    <div style="font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.18em;color:var(--gold);margin-bottom:0.5rem;">ROLES IN PLAY</div>
                    <div style="font-size:0.8rem;line-height:1.8;">${poolRoles.join('<br>')}</div>
                </div>` : ''}`;
            document.getElementById('role-modal').classList.remove('hidden');
        }

        function closeRoleModal() { document.getElementById('role-modal').classList.add('hidden'); }

        // ─── Admin ────────────────────────────────────────────────────────────────────
        function openAdmin() { document.getElementById('admin-panel').classList.add('open'); renderAdminContent(); }
        function closeAdmin() { document.getElementById('admin-panel').classList.remove('open'); }

        function renderAdminContent() {
            if (!isHost || !gameState) return;
            const div = document.getElementById('admin-content');
            if (!div) return;

            let html = `<div style="font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:0.15em;color:var(--text-dim);margin-bottom:0.5rem;">PHASE: ${gameState.phase.toUpperCase()} · ROUND ${gameState.round}</div>
          <div style="display:flex;gap:0.5rem;margin-bottom:1rem;">
            <button class="admin-btn" onclick="adminPause()" style="flex:1">${gameState.timerPaused ? '▶ Resume' : '⏸ Pause'} Timer</button>
            <button class="admin-btn" onclick="adminSkip()" style="flex:1">⏭ Skip Phase</button>
          </div>
          <div style="font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:0.15em;color:var(--text-dim);margin-bottom:0.5rem;">PLAYERS</div>`;

            Object.values(gameState.players).forEach(p => {
                const isEvil = EVIL_ROLES.includes(p.role || '');
                html += `<div class="admin-player">
              <div style="flex:1;min-width:0;">
                <div style="font-family:'Cinzel',serif;font-size:0.8rem;">${p.name}</div>
                <div style="font-size:0.72rem;color:var(--text-dim);">${p.nickname} · <span class="${isEvil ? 'evil-badge' : ''}role-badge">${p.role || '?'}</span></div>
              </div>
              ${!p.alive ? '<span style="font-size:0.7rem;color:var(--crimson-pale)">Dead</span>' : `<button class="admin-kill-btn" onclick="adminKill('${p.id}')">Kill</button>`}
            </div>`;
            });

            if (gameState.settings?.clueMode === 'physical' && gameState.hiddenClues) {
                html += `<div style="font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:0.15em;color:var(--text-dim);margin-top:1rem;margin-bottom:0.5rem;">CLUE CODES</div>`;
                gameState.hiddenClues.forEach(c => {
                    html += `<div style="padding:0.5rem;background:var(--surface2);border-radius:3px;margin-bottom:0.4rem;display:flex;justify-content:space-between;">
                <span style="font-family:'Cinzel',serif;letter-spacing:0.2em;color:var(--gold)">${c.code}</span>
                <span style="font-size:0.7rem;color:${c.found ? 'var(--good-bright)' : 'var(--text-dim)'}">${c.found ? '✓ Found' : 'Hidden'}</span>
              </div>`;
                });
            }

            div.innerHTML = html;
        }

        function adminPause() {
            send({ type: gameState?.timerPaused ? 'host_resume_timer' : 'host_pause_timer' });
        }

        function adminSkip() {
            send({ type: 'host_skip_phase' });
            closeAdmin();
        }

        function adminKill(id) {
            const p = gameState?.players[id];
            if (p && confirm(`Remove ${p.name} from the game?`)) send({ type: 'host_kill_player', targetId: id });
        }

        // ─── Game Over ────────────────────────────────────────────────────────────────
        function showGameOver() {
            if (!gameState) return;
            const el = document.getElementById('gameover');
            const winner = gameState.winner;
            document.getElementById('go-title').textContent = winner === 'Good' ? '⚖️ Good Wins' : '🔪 Evil Wins';
            document.getElementById('go-title').className = `gameover-title ${winner?.toLowerCase() || ''}`;
            document.getElementById('go-sub').textContent = winner === 'Good' ? 'Justice has been served.' : 'Darkness has prevailed.';

            const players = Object.values(gameState.players).sort((a, b) => (b.cumulativePoints || 0) - (a.cumulativePoints || 0));

            let survivorsHtml = `<h3>Final Scores</h3>
            <div style="font-size:0.62rem;font-family:'Cinzel',serif;letter-spacing:0.08em;color:var(--text-dim);display:grid;grid-template-columns:1fr 40px 40px 40px 40px 40px 50px;gap:2px;padding:0.3rem 0;border-bottom:1px solid var(--border);margin-bottom:0.25rem;">
              <span>Player</span><span>Total</span><span>Win</span><span>Sur</span><span>Obj</span><span>Role</span><span>Clue</span>
            </div>`;

            players.forEach(p => {
                const isEvil = EVIL_ROLES.includes(p.originalRole || '');
                const roleColor = isEvil ? 'var(--crimson-pale)' : 'var(--good-bright)';
                const bd = p.pointsBreakdown || {survive:0,win:0,clues:0,role:0,objectives:0};
                const roleDisplay = (p.originalRole !== p.role)
                    ? `${p.originalRole}→${p.role}`
                    : p.role;
                survivorsHtml += `
                <div style="display:grid;grid-template-columns:1fr 40px 40px 40px 40px 40px 50px;gap:2px;padding:0.4rem 0;border-bottom:1px solid var(--border);align-items:center;">
                  <div>
                    <div style="font-family:'Cinzel',serif;font-size:0.75rem;">${p.name}</div>
                    <div style="font-size:0.65rem;color:${roleColor};">${roleDisplay}</div>
                    <div style="font-size:0.62rem;color:var(--text-dim);font-style:italic;">${p.nickname} · ${p.alive ? 'Survived' : 'Eliminated'}</div>
                  </div>
                    <span style="font-family:'Cinzel',serif;font-size:0.82rem;color:var(--gold);text-align:center;">${(p.cumulativePoints || 0)}</span>
                    <span style="font-size:0.75rem;text-align:center;">${bd.win}</span>
                    <span style="font-size:0.75rem;text-align:center;">${bd.survive}</span>
                    <span style="font-size:0.75rem;text-align:center;">${bd.objectives}</span>
                    <span style="font-size:0.75rem;text-align:center;">${bd.role}</span>
                    <span style="font-size:0.75rem;text-align:center;">${bd.clues}</span>
                </div>`;
            });
            document.getElementById('go-survivors').innerHTML = survivorsHtml;

            // Host controls
            const hostControls = document.getElementById('go-host-controls');
            if (hostControls) {
                hostControls.style.display = isHost ? 'block' : 'none';
            }

            el.classList.remove('hidden');
            // Event log — all deaths in order
            const eventLogEl = document.getElementById('go-event-log');
            const allEvents = [...gameState.deathLog].map(d =>
                `<div style="padding:0.4rem 0;border-bottom:1px solid var(--border);font-size:0.82rem;">
                  Round ${d.round}: ${d.isNightDeath ? `${d.playerName} died` : `${d.playerName} was voted out`}
                 </div>`
            );
            eventLogEl.innerHTML = allEvents.join('') || '<div style="color:var(--text-dim);font-style:italic;padding:1rem;">No deaths recorded.</div>';

            // Character summary
            const me = gameState.players[myId];
            if (me) {
                const bd = me.pointsBreakdown || {};
                document.getElementById('go-char-summary').innerHTML = `
                  <div style="font-family:'Cinzel',serif;font-size:0.75rem;color:var(--gold);margin-bottom:0.75rem;">${me.name}</div>
                  <div style="font-size:0.82rem;margin-bottom:0.5rem;">Role: <span style="color:${EVIL_ROLES.includes(me.originalRole||'') ? 'var(--crimson-pale)':'var(--good-bright)'}">${me.originalRole}${me.originalRole!==me.role?'→'+me.role:''}</span></div>
                  <div style="font-size:0.82rem;margin-bottom:0.5rem;">Outcome: ${me.alive ? '✓ Survived' : '☩ Eliminated'}</div>
                  <div style="font-size:0.82rem;margin-bottom:0.5rem;">Win: +${bd.win||0} · Survive: +${bd.survive||0} · Objectives: +${bd.objectives||0} · Role: +${bd.role||0} · Clues: +${bd.clues||0}</div>
                  <div style="font-family:'Cinzel',serif;font-size:0.9rem;color:var(--gold);">Total this game: ${me.roundPoints||0} pts</div>
                  <div style="margin-top:0.75rem;font-size:0.75rem;color:var(--text-dim);">Objectives:</div>
                  ${(me.objectives||[]).map((o,i) => `<div style="padding:0.3rem 0;font-size:0.8rem;color:${me.objectivesCompleted?.[i]?'var(--good-bright)':'var(--text-dim)'};">${me.objectivesCompleted?.[i]?'✓':'○'} ${o}</div>`).join('')}
                  <div style="margin-top:0.75rem;font-size:0.75rem;color:var(--text-dim);">Clues found: ${me.discoveredClues?.length||0}</div>
                `;
            }
        }

        // ─── Page Navigation ──────────────────────────────────────────────────────────
        function switchPage(pageIndex) {
            const pages = ['page-journal', 'page-tracker', 'page-chat'];
            const tabs = document.querySelectorAll('.page-tab');
            currentPage = pageIndex;
            pages.forEach((id, i) => {
                const el = document.getElementById(id);
                if (i === pageIndex) el.className = 'page active';
                else if (i < pageIndex) el.className = 'page slide-left';
                else el.className = 'page slide-right';
            });
            tabs.forEach((t, i) => t.classList.toggle('active', i === pageIndex));
            if (pageIndex === 2) { unreadCounts[currentChatTab] = 0; updateUnreadBadges(); }
        }

        // ─── Utilities ────────────────────────────────────────────────────────────────
        function showNotif(msg) {
            const el = document.getElementById('notif');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2500);
        }

        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // ─── Init ─────────────────────────────────────────────────────────────────────
        if (!roomCode) { window.location.href = 'index.html'; }
        else { connect(); }
    </script>
</body>
</html>
